# ============================================
# Meshs One Blog - Hugo Configuration
# Domain: blog.meshs.one
# ============================================

baseURL = 'https://blog.meshs.one/'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
title = 'Meshs One Blog'
theme = 'PaperMod'

# robots.txt managed via static/robots.txt (GEO-optimized, allows AI crawlers)
enableRobotsTXT = false

# Build options
buildDrafts = false
buildFuture = false
buildExpired = false

# Google Analytics 4 - Enabled 2026-06-22
googleAnalytics = 'G-6J2EJMDDT1'

# Syntax highlighting for code blocks
[markup]
  [markup.highlight]
    style = 'dracula'
    noClasses = false
    guessSyntax = true

# Output formats
[outputs]
  home = ['HTML', 'RSS', 'JSON']

# ============================================
# Multilingual Configuration (6 languages)
# English (default, served at /), others at /zh/, /ja/, /ko/, /de/, /fr/
# ============================================
[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    title = "Meshs One Blog"
    [[languages.en.menu.main]]
      name = 'Home'
      url = '/'
      weight = 1
